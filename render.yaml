services:
  - type: web
    name: ukiyo-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy && npm run prisma:seed && npm run build && npm run build:server
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ukiyo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: VITE_API_URL
        sync: false

databases:
  - name: ukiyo-db
    plan: free
